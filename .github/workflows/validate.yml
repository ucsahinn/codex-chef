name: validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: node --check scripts/validate-repo.mjs
      - run: node --check scripts/validate-doc-locales.mjs
      - run: node --check scripts/validate-docs.mjs
      - run: node --check scripts/validate-readme-locales.mjs
      - run: node --check scripts/validate-kb-locales.mjs
      - run: node --check scripts/validate-workflow-security.mjs
      - run: node --check scripts/validate-content-safety.mjs
      - run: node --check scripts/validate-install-plan.mjs
      - run: node --check scripts/validate-install-state-preview.mjs
      - run: node --check scripts/validate-installer-alignment.mjs
      - run: node --check scripts/validate-installer-smoke.mjs
      - run: node --check scripts/plan-install.mjs
      - run: node --check scripts/merge-codex-config.mjs
      - run: node --check scripts/codex-doctor.mjs
      - run: node --check scripts/sync-doc-locales.mjs
      - run: node --check scripts/validate-agent-config.mjs
      - run: node --check scripts/validate-agent-research-corpus.mjs
      - run: node --check scripts/validate-mcp-config.mjs
      - run: node --check scripts/validate-approval-harmony.mjs
      - run: node --check scripts/validate-codex-doctor.mjs
      - run: node --check scripts/validate-diagram-triplet.mjs
      - run: node --check plugins/codex-chef-workflows/skills/offline-diagram-triplet/scripts/render-diagram-triplet.mjs
      - run: node --check scripts/analyze-token-surfaces.mjs
      - run: node --check scripts/validate-token-surfaces.mjs
      - run: node --check scripts/scan-supply-chain-iocs.mjs
      - run: node --check scripts/validate-package-surface.mjs
      - run: node --check scripts/extract-release-notes.mjs
      - run: node --check scripts/verify-skill-sources.mjs
      - run: node --check scripts/validate-release-readiness.mjs
      - run: node --check scripts/security-audit.mjs
      - run: node --check scripts/lib/approval-rules.mjs
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
      - run: bash -n scripts/install.sh
      - run: |
          CODEX_HOME="$PWD/tmp/ci-codex-home" \
          AGENTS_HOME="$PWD/tmp/ci-agents-home" \
          HOME="$PWD/tmp/ci-home" \
          bash scripts/install.sh --all --dry-run
      - shell: pwsh
        run: |
          $errors = $null
          $tokens = $null
          [System.Management.Automation.Language.Parser]::ParseFile("scripts/install.ps1", [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
      - shell: pwsh
        run: |
          $env:CODEX_HOME = Join-Path (Get-Location) "tmp/ci-codex-home"
          $env:AGENTS_HOME = Join-Path (Get-Location) "tmp/ci-agents-home"
          ./scripts/install.ps1 -All -WhatIf
      - run: npm run check

  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: node --check scripts/validate-installer-smoke.mjs
      - shell: powershell
        run: |
          $env:CODEX_HOME = Join-Path $env:TEMP "codex-chef-ci-codex-home"
          $env:AGENTS_HOME = Join-Path $env:TEMP "codex-chef-ci-agents-home"
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\scripts\install.ps1 -All -WhatIf -PlainOutput
      - run: npm.cmd run validate:installer-smoke
