<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Codex Chef icon</title>
  <desc id="desc">A public-safe Codex Chef icon combining a chef hat, terminal brackets, and circuit traces for a Codex setup kit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="58%" stop-color="#155e75"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dff7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <style>
      .trace { stroke-dasharray: 18 22; animation: trace-flow 9s linear infinite; }
      .mark { animation: mark-float 7s ease-in-out infinite; transform-origin: 256px 256px; }
      @keyframes trace-flow { to { stroke-dashoffset: -160; } }
      @keyframes mark-float { 50% { transform: translateY(-6px); } }
      @media (prefers-reduced-motion: reduce) {
        .trace, .mark { animation: none; }
      }
    </style>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <path class="trace" d="M72 386 C132 344 164 410 226 368 C286 328 322 396 440 332" fill="none" stroke="#67e8f9" stroke-width="8" stroke-linecap="round" stroke-opacity="0.28"/>
  <g fill="none" stroke="#a7f3d0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
    <path d="M90 160 H148"/>
    <path d="M118 160 V220 H158"/>
    <circle cx="82" cy="160" r="10" fill="#a7f3d0" stroke="none"/>
    <circle cx="168" cy="220" r="10" fill="#a7f3d0" stroke="none"/>
    <path d="M422 168 H364"/>
    <path d="M394 168 V228 H354"/>
    <circle cx="430" cy="168" r="10" fill="#a7f3d0" stroke="none"/>
    <circle cx="344" cy="228" r="10" fill="#a7f3d0" stroke="none"/>
  </g>
  <g class="mark" filter="url(#shadow)">
    <path d="M160 248 C119 238 96 210 96 172 C96 133 126 102 165 102 C184 62 221 42 260 52 C292 35 335 44 360 78 C397 82 424 113 424 150 C424 189 397 219 360 225 V248 Z" fill="url(#hat)" stroke="#ecfeff" stroke-width="8"/>
    <rect x="156" y="232" width="208" height="76" rx="24" fill="#ecfeff" stroke="#0f766e" stroke-width="8"/>
    <path d="M192 270 L226 244 M192 270 L226 296" stroke="#0f766e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M320 244 L354 270 L320 296" stroke="#0f766e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M246 282 H288" stroke="#164e63" stroke-width="12" stroke-linecap="round"/>
  </g>
  <text x="256" y="388" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="800" fill="#ecfeff">Chef</text>
</svg>
