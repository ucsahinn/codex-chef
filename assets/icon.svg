<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Codex Chef premium icon</title>
  <desc id="desc">A polished Codex Chef badge with a chef hat, terminal glyph, shield, connector nodes, and a safe setup glow.</desc>
  <defs>
    <radialGradient id="aura" cx="50%" cy="36%" r="70%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="34%" stop-color="#2dd4bf"/>
      <stop offset="76%" stop-color="#164e63"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="48%" stop-color="#123c4a"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="56%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="porcelain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="68%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <filter id="soft-shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.34"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#fef3c7" flood-opacity="0.25"/>
    </filter>
    <style>
      .orbit { stroke-dasharray: 12 18; animation: orbit 12s linear infinite; }
      .mark { animation: mark-float 7s cubic-bezier(.22,1,.36,1) infinite; transform-origin: 256px 256px; }
      .node { animation: node-pulse 3.2s ease-in-out infinite; transform-origin: center; }
      @keyframes orbit { to { stroke-dashoffset: -180; } }
      @keyframes mark-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
      @keyframes node-pulse { 0%,100% { opacity: .68; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
      @media (prefers-reduced-motion: reduce) {
        .orbit, .mark, .node { animation: none; }
      }
    </style>
  </defs>

  <rect width="512" height="512" rx="116" fill="#020617"/>
  <rect x="18" y="18" width="476" height="476" rx="102" fill="url(#aura)" opacity="0.9"/>
  <rect x="34" y="34" width="444" height="444" rx="90" fill="url(#badge)"/>
  <path d="M92 356 C150 312 188 374 252 324 C316 276 360 342 420 294" fill="none" stroke="#67e8f9" stroke-width="7" stroke-linecap="round" opacity="0.28" class="orbit"/>
  <path d="M104 148 H154 V200 H192" fill="none" stroke="#99f6e4" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.62"/>
  <path d="M408 154 H358 V206 H320" fill="none" stroke="#fde68a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.62"/>
  <circle class="node" cx="104" cy="148" r="10" fill="#99f6e4"/>
  <circle class="node" cx="192" cy="200" r="8" fill="#99f6e4"/>
  <circle class="node" cx="408" cy="154" r="10" fill="#fde68a"/>
  <circle class="node" cx="320" cy="206" r="8" fill="#fde68a"/>

  <g class="mark" filter="url(#soft-shadow)">
    <path d="M152 247 C118 238 97 213 97 179 C97 140 127 110 165 110 C181 74 216 55 252 63 C285 43 329 55 351 90 C388 93 415 122 415 158 C415 197 389 224 354 230 V247 Z" fill="url(#porcelain)" stroke="#f8fafc" stroke-width="8"/>
    <path d="M164 235 H348 C361 235 372 246 372 259 V318 C372 333 360 345 345 345 H167 C152 345 140 333 140 318 V259 C140 246 151 235 164 235 Z" fill="#ecfeff" stroke="#0f766e" stroke-width="8"/>
    <path d="M172 290 L212 259 M172 290 L212 321" fill="none" stroke="#0f766e" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M300 259 L340 290 L300 321" fill="none" stroke="#0f766e" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M230 307 H281" fill="none" stroke="#164e63" stroke-width="13" stroke-linecap="round"/>
    <path d="M256 360 L318 382 V415 C318 439 290 455 256 463 C222 455 194 439 194 415 V382 Z" fill="#082f49" stroke="url(#gold)" stroke-width="9" stroke-linejoin="round"/>
    <path d="M232 413 L250 430 L284 392" fill="none" stroke="#fde68a" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <path d="M78 404 C142 448 370 450 434 402" fill="none" stroke="#fef3c7" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
</svg>
