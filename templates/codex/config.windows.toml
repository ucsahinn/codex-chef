# Windows-first Codex Chef.
# Copy to ~/.codex/config.toml with scripts/install.ps1.

model = "gpt-5.5"
review_model = "gpt-5.5"
model_reasoning_effort = "medium"
model_reasoning_summary = "auto"
model_verbosity = "medium"
personality = "pragmatic"

approval_policy = "on-request"
approvals_reviewer = "auto_review"
sandbox_mode = "workspace-write"

[features]
apps = true
memories = true
hooks = true
multi_agent = true

[shell_environment_policy]
inherit = "core"
ignore_default_excludes = false
exclude = ["AWS_*", "AZURE_*", "OPENAI_*", "CODEX_API_KEY", "GITHUB_TOKEN", "GH_TOKEN", "*_TOKEN", "*_SECRET", "*_PASSWORD", "*_KEY"]

[memories]
disable_on_external_context = true
min_rate_limit_remaining_percent = 15

[apps._default]
enabled = false
destructive_enabled = false
open_world_enabled = false
default_tools_approval_mode = "prompt"

[agents]
max_threads = 10
max_depth = 1
job_max_runtime_seconds = 3600

[agents.code_mapper]
description = "Read-only explorer that maps files, call paths, and existing patterns."
config_file = "agents/code_mapper.toml"

[agents.docs_researcher]
description = "Primary-source researcher for current docs, APIs, and version-sensitive facts."
config_file = "agents/docs_researcher.toml"

[agents.context_architect]
description = "Context strategist that decides what belongs in prompts, AGENTS.md, skills, plugins, MCP, hooks, memory, or config."
config_file = "agents/context_architect.toml"

[agents.prompt_architect]
description = "Prompt and instruction designer for reliable task briefs, mode contracts, and reusable workflows."
config_file = "agents/prompt_architect.toml"

[agents.mcp_integrator]
description = "MCP and connector planner for least-privilege tool exposure, auth boundaries, and troubleshooting."
config_file = "agents/mcp_integrator.toml"

[agents.product_strategist]
description = "Product strategist for forcing questions, scope decisions, and 10-star alternatives before implementation."
config_file = "agents/product_strategist.toml"

[agents.engineering_planner]
description = "Engineering planner for architecture, data flow, diagrams, edge cases, and test strategy."
config_file = "agents/engineering_planner.toml"

[agents.design_reviewer]
description = "Design reviewer for UX quality, AI-slop detection, design-system gaps, and visual decision tradeoffs."
config_file = "agents/design_reviewer.toml"

[agents.devex_auditor]
description = "Developer-experience auditor for onboarding friction, TTHW, docs clarity, and magical-moment checks."
config_file = "agents/devex_auditor.toml"

[agents.root_cause_debugger]
description = "Systematic debugger that investigates failures, traces data flow, and tests hypotheses before fixes."
config_file = "agents/root_cause_debugger.toml"

[agents.qa_lead]
description = "QA lead for end-to-end bug finding, regression coverage, and re-verification plans."
config_file = "agents/qa_lead.toml"

[agents.performance_auditor]
description = "Performance auditor for page speed, Core Web Vitals, resource budgets, and post-change regressions."
config_file = "agents/performance_auditor.toml"

[agents.google_seo_auditor]
description = "Google SEO auditor for crawlability, indexing, metadata, structured data, Core Web Vitals, and Search Console-ready fixes."
config_file = "agents/google_seo_auditor.toml"

[agents.docs_author]
description = "Documentation author for Diataxis coverage, stale docs, release docs, and missing guide generation."
config_file = "agents/docs_author.toml"

[agents.spec_author]
description = "Spec author for turning vague intent into executable specs with scope, evidence, and quality gates."
config_file = "agents/spec_author.toml"

[agents.code_reviewer]
description = "Fresh-context senior review for diffs, PRs, and risky changes."
config_file = "agents/code_reviewer.toml"

[agents.frontend_verifier]
description = "Browser-oriented verifier for UI changes and visual regressions."
config_file = "agents/frontend_verifier.toml"

[agents.security_auditor]
description = "Read-only security auditor for auth, secrets, API routes, data access, permissions, and abuse paths."
config_file = "agents/security_auditor.toml"

[agents.test_verifier]
description = "Validation specialist for tests, lint/typecheck/build, smoke checks, and failure evidence."
config_file = "agents/test_verifier.toml"

[agents.release_verifier]
description = "Release readiness verifier for git hygiene, changelog/version checks, artifacts, secret scans, and publish gates."
config_file = "agents/release_verifier.toml"

[agents.codex_doctor]
description = "Setup diagnostician for starter health, catalog drift, install-plan coverage, and safe next checks."
config_file = "agents/codex_doctor.toml"

[sandbox_workspace_write]
network_access = false

[windows]
sandbox = "elevated"
sandbox_private_desktop = true

[mcp_servers.openaiDeveloperDocs]
enabled = true
url = "https://developers.openai.com/mcp"
default_tools_approval_mode = "approve"
startup_timeout_sec = 20
tool_timeout_sec = 120

[mcp_servers.context7]
enabled = true
command = "cmd.exe"
args = ["/c", "npx", "-y", "@upstash/context7-mcp@3.2.1"]
default_tools_approval_mode = "approve"
startup_timeout_sec = 20
tool_timeout_sec = 120

[mcp_servers.sequential-thinking]
enabled = true
command = "cmd.exe"
args = ["/c", "npx", "-y", "@modelcontextprotocol/server-sequential-thinking@2025.12.18"]
default_tools_approval_mode = "approve"
startup_timeout_sec = 20
tool_timeout_sec = 120

[mcp_servers.playwright]
enabled = true
command = "cmd.exe"
args = ["/c", "npx", "-y", "@playwright/mcp@0.0.76"]
default_tools_approval_mode = "prompt"
enabled_tools = ["browser_snapshot", "browser_take_screenshot", "browser_console_messages", "browser_network_requests", "browser_wait_for", "browser_resize", "browser_navigate", "browser_navigate_back", "browser_close", "browser_tabs"]
startup_timeout_sec = 20
tool_timeout_sec = 180

# Read-only browser evidence can run without extra prompts; interaction stays prompt-only.
[mcp_servers.playwright.tools.browser_snapshot]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_take_screenshot]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_console_messages]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_network_requests]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_network_request]
approval_mode = "prompt"

[mcp_servers.playwright.tools.browser_wait_for]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_resize]
approval_mode = "approve"

[mcp_servers.chrome-devtools]
enabled = true
command = "cmd.exe"
args = ["/c", "npx", "-y", "chrome-devtools-mcp@1.2.0", "--isolated", "--no-usage-statistics", "--redactNetworkHeaders", "--viewport", "1366x900"]
default_tools_approval_mode = "prompt"
enabled_tools = ["list_pages", "select_page", "take_snapshot", "take_screenshot", "list_console_messages", "get_console_message", "list_network_requests", "wait_for", "resize_page", "navigate_page", "navigate_page_history", "close_page"]
startup_timeout_sec = 20
tool_timeout_sec = 180

[mcp_servers.chrome-devtools.tools.list_pages]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.select_page]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.take_snapshot]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.take_screenshot]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.list_console_messages]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.get_console_message]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.list_network_requests]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.get_network_request]
approval_mode = "prompt"

[mcp_servers.chrome-devtools.tools.wait_for]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.resize_page]
approval_mode = "approve"

[mcp_servers.serena]
enabled = true
command = "uvx"
args = ["--from", "git+https://github.com/oraios/serena.git@22c135a881aaf17485e54ef0ccaedeaf51a202c0", "serena", "start-mcp-server", "--context", "codex"]
default_tools_approval_mode = "prompt"
enabled_tools = ["activate_project", "get_current_config", "initial_instructions", "list_memories", "read_memory", "search_for_pattern", "find_symbol", "find_declaration", "find_implementations", "find_referencing_symbols", "get_symbols_overview", "get_diagnostics_for_file"]
startup_timeout_sec = 30
tool_timeout_sec = 180

[mcp_servers.serena.tools.activate_project]
approval_mode = "approve"

[mcp_servers.serena.tools.get_current_config]
approval_mode = "approve"

[mcp_servers.serena.tools.initial_instructions]
approval_mode = "approve"

[mcp_servers.serena.tools.onboarding]
approval_mode = "approve"

[mcp_servers.serena.tools.list_memories]
approval_mode = "approve"

[mcp_servers.serena.tools.read_memory]
approval_mode = "approve"

[mcp_servers.serena.tools.search_for_pattern]
approval_mode = "approve"

[mcp_servers.serena.tools.find_symbol]
approval_mode = "approve"

[mcp_servers.serena.tools.find_declaration]
approval_mode = "approve"

[mcp_servers.serena.tools.find_implementations]
approval_mode = "approve"

[mcp_servers.serena.tools.find_referencing_symbols]
approval_mode = "approve"

[mcp_servers.serena.tools.get_symbols_overview]
