[mcp_servers.serena.tools.delete_memory]
approval_mode = "prompt"

[mcp_servers.serena.tools.write_memory]
approval_mode = "prompt"

[mcp_servers.memory]
enabled = true
command = "cmd.exe"
args = ["/c", "npx", "-y", "@modelcontextprotocol/server-memory@2026.1.26"]
default_tools_approval_mode = "prompt"
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.memory.tools.read_graph]
approval_mode = "approve"

[mcp_servers.memory.tools.search_nodes]
approval_mode = "approve"

[mcp_servers.memory.tools.open_nodes]
approval_mode = "approve"

# Optional graph-backed code intelligence for broad repo mapping and impact analysis.
# Enable only when a task needs local repository indexing.
[mcp_servers.codebase-memory]
enabled = true
command = "cmd.exe"
args = ["/c", "npx", "-y", "codebase-memory-mcp@0.8.1"]
default_tools_approval_mode = "prompt"
enabled_tools = ["list_projects", "index_status", "search_graph", "trace_path", "detect_changes", "query_graph", "get_graph_schema", "get_code_snippet", "get_architecture", "search_code"]
disabled_tools = ["delete_project", "manage_adr", "ingest_traces", "index_repository"]
startup_timeout_sec = 30
tool_timeout_sec = 300

[mcp_servers.codebase-memory.tools.list_projects]
approval_mode = "approve"

[mcp_servers.codebase-memory.tools.index_status]
approval_mode = "approve"

[mcp_servers.codebase-memory.tools.search_graph]
