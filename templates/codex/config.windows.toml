# Disabled by default because it grants local filesystem tool access.
# Replace the path with an intentional workspace before enabling.
[mcp_servers.filesystem]
enabled = false
command = "cmd.exe"
args = ["/c", "npx", "-y", "@modelcontextprotocol/server-filesystem@2026.1.14", "%USERPROFILE%\\Desktop"]
default_tools_approval_mode = "prompt"
startup_timeout_sec = 20
tool_timeout_sec = 60

